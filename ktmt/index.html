<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Kiến Trúc Máy Tính – Ôn Luyện</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1D4ED8;--blue-l:#EFF6FF;--blue-m:#BFDBFE;
  --orange:#F97316;--orange-l:#FFF7ED;
  --green:#16A34A;--green-l:#F0FDF4;--green-m:#BBF7D0;
  --red:#DC2626;--red-l:#FEF2F2;--red-m:#FECACA;
  --bg:#F8FAFC;--surface:#fff;--border:#E2E8F0;
  --text:#0F172A;--muted:#64748B;
  --shadow:0 2px 12px rgba(0,0,0,.07);
  --r:10px;--r-lg:16px;
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:'Be Vietnam Pro',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* TOPBAR */
.topbar{background:var(--blue);color:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(29,78,216,.3)}
.topbar-brand{font-size:1.1rem;font-weight:800;letter-spacing:-.02em}
.topbar-brand span{color:#FCD34D}
.topbar-info{font-size:.82rem;opacity:.85}

/* LAYOUT */
.shell{display:flex;min-height:calc(100vh - 56px)}
.sidebar{width:240px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:16px 10px;position:sticky;top:56px;height:calc(100vh - 56px);overflow-y:auto}
.sb-title{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);padding:8px 10px 4px}
.sb-btn{display:flex;align-items:center;gap:8px;width:100%;padding:9px 12px;border:none;background:transparent;border-radius:8px;font-size:.85rem;font-weight:500;color:var(--muted);cursor:pointer;text-align:left;transition:.15s}
.sb-btn:hover{background:var(--bg);color:var(--text)}
.sb-btn.active{background:var(--blue-l);color:var(--blue);font-weight:700}
.sb-btn .sb-badge{margin-left:auto;font-size:.68rem;background:var(--bg);border:1px solid var(--border);border-radius:99px;padding:1px 6px;color:var(--muted)}
.sb-btn.active .sb-badge{background:var(--blue-m);border-color:var(--blue-m);color:var(--blue)}
.sb-divider{height:1px;background:var(--border);margin:8px 0}

/* MAIN */
.main{flex:1;padding:24px;min-width:0}

/* HOME */
#home-view{max-width:900px}
.home-header{margin-bottom:24px}
.home-header h1{font-size:1.6rem;font-weight:800}
.home-header p{color:var(--muted);margin-top:4px;font-size:.9rem}
.lesson-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.lesson-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px;cursor:pointer;transition:.18s;position:relative;overflow:hidden}
.lesson-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--blue)}
.lesson-card:nth-child(even)::before{background:var(--orange)}
.lesson-card:hover{transform:translateY(-2px);box-shadow:var(--shadow);border-color:var(--blue-m)}
.lc-num{font-size:.72rem;font-weight:700;text-transform:uppercase;color:var(--blue);margin-bottom:6px}
.lesson-card:nth-child(even) .lc-num{color:var(--orange)}
.lc-title{font-size:.95rem;font-weight:700;line-height:1.35;margin-bottom:8px}
.lc-count{font-size:.78rem;color:var(--muted)}
.lc-arrow{position:absolute;bottom:14px;right:14px;color:var(--muted);font-size:.85rem;transition:.15s}
.lesson-card:hover .lc-arrow{color:var(--blue);transform:translateX(3px)}

/* LESSON VIEW */
#lesson-view{display:none}
.lesson-header{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 22px;margin-bottom:18px}
.lh-back{display:inline-flex;align-items:center;gap:5px;font-size:.82rem;color:var(--muted);cursor:pointer;background:none;border:none;margin-bottom:10px;transition:.15s;padding:0}
.lh-back:hover{color:var(--blue)}
.lh-title{font-size:1.2rem;font-weight:800}
.lh-meta{display:flex;gap:12px;margin-top:6px;flex-wrap:wrap}
.lh-chip{font-size:.75rem;font-weight:600;padding:3px 10px;border-radius:99px;background:var(--blue-l);color:var(--blue)}
.lh-chip.orange{background:var(--orange-l);color:var(--orange)}
.lh-chip.green{background:var(--green-l);color:var(--green)}

/* QUESTION CARD */
.q-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:24px;margin-bottom:14px}
.q-head{display:flex;align-items:flex-start;gap:12px;margin-bottom:14px}
.q-num{width:32px;height:32px;border-radius:50%;background:var(--blue-l);color:var(--blue);font-size:.82rem;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.q-num.multi{background:var(--orange-l);color:var(--orange)}
.q-num.fill{background:var(--green-l);color:var(--green)}
.q-text{font-size:.95rem;font-weight:600;line-height:1.6;flex:1}
.q-type-tag{display:inline-block;font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;background:var(--orange-l);color:var(--orange);padding:2px 8px;border-radius:99px;margin-bottom:10px}
.q-img{margin:10px 0 14px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}
.q-img img{display:block;max-width:100%;height:auto;max-height:320px;object-fit:contain;background:#f8f9fa}

/* ANSWER OPTIONS */
.opts{display:flex;flex-direction:column;gap:8px}
.opt{display:flex;align-items:flex-start;gap:10px;padding:11px 14px;border-radius:8px;border:1.5px solid var(--border);cursor:pointer;font-size:.875rem;font-weight:500;color:#374151;transition:.15s;user-select:none}
.opt:hover:not(.revealed){border-color:var(--blue-m);background:var(--blue-l);color:var(--blue)}
.opt.selected{border-color:var(--blue);background:var(--blue-l);color:var(--blue)}
.opt.correct-ans{border-color:var(--green);background:var(--green-l);color:var(--green)}
.opt.wrong-ans{border-color:var(--red);background:var(--red-l);color:var(--red)}
.opt.revealed{cursor:default}
.opt-key{width:24px;height:24px;border-radius:50%;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0}
.opt-mark{margin-left:auto;font-size:1rem}

/* MULTI-SELECT */
.opt .checkbox{width:17px;height:17px;border-radius:4px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0;margin-top:1px}

/* FILL ANSWER */
.fill-wrap{margin-top:10px}
.fill-input{font-family:'Be Vietnam Pro',sans-serif;font-size:.9rem;width:100%;padding:9px 13px;border:1.5px solid var(--border);border-radius:8px;transition:.15s;background:var(--bg)}
.fill-input:focus{outline:none;border-color:var(--blue);background:#fff;box-shadow:0 0 0 3px rgba(29,78,216,.08)}
.fill-input.correct-fill{border-color:var(--green);background:var(--green-l)}
.fill-input.wrong-fill{border-color:var(--red);background:var(--red-l)}
.fill-hint{font-size:.78rem;color:var(--green);margin-top:5px;font-weight:600}
.fill-hint.wrong{color:var(--red)}

/* FEEDBACK */
.q-feedback{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:.85rem;font-weight:600}
.q-feedback.ok{background:var(--green-l);color:var(--green)}
.q-feedback.fail{background:var(--red-l);color:var(--red)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;font-family:'Be Vietnam Pro',sans-serif;font-size:.875rem;font-weight:600;padding:8px 18px;border-radius:8px;border:none;cursor:pointer;transition:.15s}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--blue);color:#fff}
.btn-primary:hover{background:#1E40AF;box-shadow:0 4px 12px rgba(29,78,216,.25)}
.btn-ghost{background:transparent;color:#374151;border:1.5px solid var(--border)}
.btn-ghost:hover{background:var(--bg);border-color:#CBD5E1}
.btn-sm{font-size:.8rem;padding:6px 12px;border-radius:6px}
.btn-orange{background:var(--orange);color:#fff}
.btn-orange:hover{background:#EA580C}

/* ACTION ROW */
.q-action{display:flex;justify-content:space-between;align-items:center;margin-top:14px}

/* RESULT BOX */
.result-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 22px;margin-bottom:20px;display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.result-score{font-size:2rem;font-weight:800;color:var(--blue)}
.result-info{flex:1}
.result-info p{font-size:.875rem;color:var(--muted);margin-top:2px}
.result-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}

/* PROGRESS DOTS */
.q-dots{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:18px}
.q-dot{width:28px;height:28px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700;color:var(--muted);cursor:pointer;transition:.12s}
.q-dot:hover{border-color:var(--blue);color:var(--blue)}
.q-dot.current{border-color:var(--blue);background:var(--blue-l);color:var(--blue)}
.q-dot.answered{border-color:var(--green);background:var(--green-l);color:var(--green)}

/* RESPONSIVE */
@media(max-width:768px){
  .sidebar{display:none}
  .main{padding:14px}
}
@media(max-width:480px){
  .lesson-grid{grid-template-columns:1fr 1fr}
  .q-card{padding:16px}
}
</style>
</head>

// ── STATE ─────────────────────────────────────────────────────────────────────
let curLesson = -1;
let userAnswers = {}; // { qIdx: answer }
let submitted = false;

// ── INIT HOME ──────────────────────────────────────────────────────────────────
function initHome() {
  const grid = document.getElementById('lesson-grid');
  grid.innerHTML = LESSONS.map((l,i)=>`
    <div class="lesson-card" onclick="showLesson(${i},null)">
      <div class="lc-num">Bài ${i+1}</div>
      <div class="lc-title">${l.title.replace(`Bài ${i+1} – `, '')}</div>
      <div class="lc-count">${l.questions.length} câu hỏi</div>
      <div class="lc-arrow">→</div>
    </div>
  `).join('');
}

// ── NAVIGATION ────────────────────────────────────────────────────────────────
function showHome(btn) {
  document.getElementById('home-view').style.display='block';
  document.getElementById('lesson-view').style.display='none';
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else document.querySelector('.sb-btn').classList.add('active');
  curLesson=-1;
}

function showLesson(idx, btn) {
  curLesson=idx;
  userAnswers={};
  submitted=false;
  document.getElementById('home-view').style.display='none';
  document.getElementById('lesson-view').style.display='block';
  document.querySelectorAll('.sb-btn').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  else document.querySelectorAll('.sb-btn')[idx+1].classList.add('active');

  const l=LESSONS[idx];
  document.getElementById('lh-title').textContent=l.title;
  const meta=document.getElementById('lh-meta');
  const multi=l.questions.filter(q=>q.type==='multi').length;
  const fill=l.questions.filter(q=>q.type==='fill').length;
  meta.innerHTML=`
    <span class="lh-chip">${l.questions.length} câu hỏi</span>
    ${multi?`<span class="lh-chip orange">${multi} câu chọn nhiều</span>`:''}
    ${fill?`<span class="lh-chip green">${fill} câu điền</span>`:''}
  `;

  renderDots();
  renderQuestions();
  document.getElementById('result-bar').style.display='none';
  document.getElementById('lesson-view').scrollIntoView({behavior:'smooth'});
}

// ── DOTS ──────────────────────────────────────────────────────────────────────
function renderDots() {
  const l=LESSONS[curLesson];
  document.getElementById('q-dots').innerHTML=l.questions.map((q,i)=>`
    <div class="q-dot${userAnswers[i]!==undefined?' answered':''}" id="dot-${i}" onclick="scrollToQ(${i})" title="Câu ${i+1}">${i+1}</div>
  `).join('');
}

function scrollToQ(i) {
  document.getElementById(`q-card-${i}`)?.scrollIntoView({behavior:'smooth',block:'center'});
}

function updateDot(i) {
  const d=document.getElementById(`dot-${i}`);
  if(d) d.classList.toggle('answered', userAnswers[i]!==undefined);
}

// ── RENDER QUESTIONS ──────────────────────────────────────────────────────────
function renderQuestions() {
  const l=LESSONS[curLesson];
  const container=document.getElementById('q-list');
  container.innerHTML=l.questions.map((q,i)=>renderQ(q,i,l)).join('');
}

function imgKey(lessonIdx, q) {
  return `${lessonIdx+1}_${q.n}`;
}

function renderQ(q, i, l) {
  const lIdx=curLesson;
  const key=`${lIdx+1}_${q.n}`;
  const imgSrc=IMG_Q[key];
  const imgHtml=imgSrc?`<div class="q-img"><img src="${imgSrc}" alt="Hình câu ${q.n}" onerror="this.parentElement.style.display='none'" loading="lazy"/></div>`:'';

  let bodyHtml='';
  if(q.type==='single'||q.type==='multi') {
    const labels=['A','B','C','D','E','F'];
    bodyHtml=`<div class="opts" id="opts-${i}">${q.opts.map((o,j)=>`
      <div class="opt" id="opt-${i}-${j}" onclick="selectOpt(${i},${j})">
        <span class="opt-key">${labels[j]}</span>
        <span>${o}</span>
        <span class="opt-mark" id="mark-${i}-${j}"></span>
      </div>`).join('')}</div>`;
  } else {
    bodyHtml=`<div class="fill-wrap">
      <input class="fill-input" id="fill-${i}" type="text" placeholder="Nhập đáp án..."
        oninput="saveFill(${i})" onkeydown="if(event.key==='Enter')checkFill(${i})"/>
      <div id="fill-hint-${i}" style="display:none"></div>
    </div>`;
  }

  const typeLabel=q.type==='multi'?'Chọn nhiều đáp án':q.type==='fill'?'Điền câu trả lời':'Chọn một đáp án';

  return `<div class="q-card" id="q-card-${i}">
    <div class="q-head">
      <div class="q-num ${q.type}" title="${typeLabel}">${i+1}</div>
      <div>
        <div class="q-type-tag">${typeLabel}</div>
        <div class="q-text">${q.text}</div>
      </div>
    </div>
    ${imgHtml}
    ${bodyHtml}
    <div id="feedback-${i}" style="display:none"></div>
    ${q.type!=='fill'?`<div class="q-action"><span></span><button class="btn btn-primary btn-sm" onclick="checkAnswer(${i})">Kiểm tra</button></div>`:''}
  </div>`;
}

// ── ANSWER LOGIC ──────────────────────────────────────────────────────────────
function selectOpt(qi, oi) {
  if(submitted) return;
  const q=LESSONS[curLesson].questions[qi];
  if(q.type==='single') {
    userAnswers[qi]=[oi];
    for(let j=0;j<q.opts.length;j++) {
      const el=document.getElementById(`opt-${qi}-${j}`);
      if(el) el.classList.toggle('selected',j===oi);
    }
  } else {
    if(!userAnswers[qi]) userAnswers[qi]=[];
    const arr=userAnswers[qi];
    const idx=arr.indexOf(oi);
    if(idx===-1) arr.push(oi); else arr.splice(idx,1);
    const el=document.getElementById(`opt-${qi}-${oi}`);
    if(el) el.classList.toggle('selected');
  }
  updateDot(qi);
}

function saveFill(qi) {
  const val=document.getElementById(`fill-${qi}`)?.value||'';
  userAnswers[qi]=val;
  updateDot(qi);
}

function checkAnswer(qi) {
  if(submitted) return;
  const q=LESSONS[curLesson].questions[qi];
  const ua=userAnswers[qi];
  if(ua===undefined||(Array.isArray(ua)&&ua.length===0)) return;
  revealQ(qi, q, ua, true);
}

function checkFill(qi) { checkAnswer(qi); }

function revealQ(qi, q, ua, single) {
  const labels=['A','B','C','D','E','F'];
  if(q.type==='single'||q.type==='multi') {
    const correct=new Set(q.ans);
    const selected=new Set(Array.isArray(ua)?ua:[ua]);
    for(let j=0;j<q.opts.length;j++) {
      const el=document.getElementById(`opt-${qi}-${j}`);
      if(!el) continue;
      el.classList.remove('selected');
      el.classList.add('revealed');
      if(correct.has(j)) { el.classList.add('correct-ans'); document.getElementById(`mark-${qi}-${j}`).textContent='✓'; }
      else if(selected.has(j)) { el.classList.add('wrong-ans'); document.getElementById(`mark-${qi}-${j}`).textContent='✗'; }
    }
    const isCorrect=[...correct].every(c=>selected.has(c))&&[...selected].every(s=>correct.has(s));
    showFeedback(qi, isCorrect, q.ans.map(a=>labels[a]).join(', '));
  } else {
    const inp=document.getElementById(`fill-${qi}`);
    const val=(ua||'').toString().trim().toLowerCase();
    const correct=q.ans_text.trim().toLowerCase();
    const ok=val===correct||val.replace(/\s/g,'')===correct.replace(/\s/g,'');
    if(inp){ inp.classList.add(ok?'correct-fill':'wrong-fill'); inp.disabled=true; }
    const hint=document.getElementById(`fill-hint-${qi}`);
    if(hint){
      hint.style.display='block';
      hint.className=`fill-hint${ok?'':' wrong'}`;
      hint.textContent=ok?'✓ Chính xác!':'✗ Đáp án đúng: '+q.ans_text;
    }
  }
}

function showFeedback(qi, isCorrect, correctLabel) {
  const fb=document.getElementById(`feedback-${qi}`);
  if(!fb) return;
  fb.className='q-feedback '+(isCorrect?'ok':'fail');
  fb.textContent=isCorrect?'✓ Chính xác!':'✗ Chưa đúng. Đáp án: '+correctLabel;
  fb.style.display='block';
}

// ── SUBMIT ALL ────────────────────────────────────────────────────────────────
function submitAll() {
  submitted=true;
  const l=LESSONS[curLesson];
  let correct=0;
  l.questions.forEach((q,i)=>{
    const ua=userAnswers[i];
    revealQ(i, q, ua, false);
    if(isCorrectAnswer(q,ua)) correct++;
  });
  // Remove check buttons
  document.querySelectorAll('.q-action').forEach(a=>a.style.display='none');
  // Show result
  const pct=Math.round(correct/l.questions.length*100);
  const bar=document.getElementById('result-bar');
  bar.style.display='flex';
  bar.innerHTML=`
    <div class="result-score" style="color:${pct>=70?'var(--green)':pct>=50?'var(--orange)':'var(--red)'}">${pct}%</div>
    <div class="result-info">
      <div style="font-weight:700;font-size:1rem">${pct>=70?'🎉 Xuất sắc!':pct>=50?'👍 Khá tốt!':'📚 Cần ôn thêm!'}</div>
      <p>Đúng ${correct}/${l.questions.length} câu hỏi</p>
      <div class="result-chips">
        <span class="lh-chip green">✓ ${correct} đúng</span>
        <span class="lh-chip" style="background:var(--red-l);color:var(--red)">✗ ${l.questions.length-correct} sai</span>
      </div>
    </div>`;
  bar.scrollIntoView({behavior:'smooth'});
}

function isCorrectAnswer(q, ua) {
  if(ua===undefined) return false;
  if(q.type==='fill') {
    const v=(ua||'').toString().trim().toLowerCase();
    const c=q.ans_text.trim().toLowerCase();
    return v===c||v.replace(/\s/g,'')===c.replace(/\s/g,'');
  }
  const correct=new Set(q.ans);
  const selected=new Set(Array.isArray(ua)?ua:[ua]);
  return [...correct].every(c=>selected.has(c))&&[...selected].every(s=>correct.has(s));
}

// ── RESET ──────────────────────────────────────────────────────────────────────
function resetLesson() {
  userAnswers={};
  submitted=false;
  renderDots();
  renderQuestions();
  document.getElementById('result-bar').style.display='none';
  window.scrollTo({top:0,behavior:'smooth'});
}

// ── BOOT ──────────────────────────────────────────────────────────────────────
initHome();
</script>
